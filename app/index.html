<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Office Agent 最小前端</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 720px;
            margin: 40px auto;
            padding: 0 16px;
        }

        h1 {
            margin-bottom: 20px;
        }

        form {
            display: grid;
            gap: 12px;
        }

        label {
            font-weight: 600;
        }

        input,
        textarea,
        button {
            font-size: 14px;
            padding: 8px;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            background: #f6f8fa;
            padding: 12px;
            border-radius: 8px;
        }

        .error {
            color: #c62828;
        }

        .hidden {
            display: none;
        }

        .result-title {
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result-item {
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .badge-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            border-radius: 999px;
            padding: 2px 10px;
            font-size: 12px;
            border: 1px solid transparent;
            background: #f3f4f6;
            color: #374151;
        }

        .badge-ok {
            background: #ecfdf3;
            border-color: #bbf7d0;
            color: #166534;
        }

        .badge-off {
            background: #f3f4f6;
            border-color: #d1d5db;
            color: #4b5563;
        }

        .download-link {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            border: 1px solid #d0d7de;
            text-decoration: none;
            color: #0969da;
            background: #fff;
        }

        .raw-json {
            margin-top: 12px;
            white-space: pre-wrap;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 10px;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
            max-height: 280px;
            overflow: auto;
        }
    </style>
</head>

<body>
    <h1>Office Agent Demo</h1>
    <form id="demo-form">
        <div>
            <label for="excel_file">Excel 文件</label><br />
            <input id="excel_file" name="excel_file" type="file" required />
        </div>

        <div>
            <label for="word_file">Word 文件</label><br />
            <input id="word_file" name="word_file" type="file" required />
        </div>

        <div>
            <label for="prompt">Prompt</label><br />
            <textarea id="prompt" name="prompt" placeholder="请输入你的任务描述" required></textarea>
        </div>

        <button type="submit">提交</button>
    </form>

    <div id="status" class="result hidden">
        <div id="result-title" class="result-title"></div>
        <div id="result-message" class="result-item"></div>
        <div id="result-output" class="result-item"></div>
        <div id="result-mapper" class="result-item"></div>
        <a id="download-link" class="download-link hidden" target="_blank" rel="noopener noreferrer">下载输出文件</a>
        <div id="raw-json" class="raw-json hidden"></div>
    </div>

    <script>
        const form = document.getElementById('demo-form');
        const statusBox = document.getElementById('status');
        const resultTitle = document.getElementById('result-title');
        const resultMessage = document.getElementById('result-message');
        const resultOutput = document.getElementById('result-output');
        const resultMapper = document.getElementById('result-mapper');
        const downloadLink = document.getElementById('download-link');
        const rawJson = document.getElementById('raw-json');

        function resetResult() {
            statusBox.className = 'result';
            statusBox.classList.remove('hidden');
            resultTitle.textContent = '';
            resultMessage.textContent = '';
            resultOutput.textContent = '';
            resultMapper.textContent = '';
            downloadLink.classList.add('hidden');
            downloadLink.removeAttribute('href');
            rawJson.classList.add('hidden');
            rawJson.textContent = '';
        }

        function renderRawJson(json) {
            rawJson.classList.remove('hidden');
            rawJson.textContent = JSON.stringify(json, null, 2);
        }

        function toBadge(label, value) {
            const enabled = Boolean(value);
            const cls = enabled ? 'badge badge-ok' : 'badge badge-off';
            return `<span class="${cls}">${label}: ${enabled ? 'true' : 'false'}</span>`;
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            resetResult();
            resultTitle.textContent = '处理中...';

            const formData = new FormData(form);

            try {
                const resp = await fetch('/api/run', {
                    method: 'POST',
                    body: formData,
                });

                const json = await resp.json();
                if (!resp.ok) {
                    const detail = json.detail || json.message || '请求失败';
                    statusBox.className = 'result error';
                    resultTitle.textContent = '处理失败';
                    resultMessage.textContent = `错误: ${detail}`;
                    renderRawJson(json);
                    return;
                }

                const data = json.data || {};
                const outputFile = data.output_file || '';
                const outputUrl = data.output_file_url || '';
                const llmEnabled = data.llm_enabled;
                const mapperSummary = data.mapper_summary || {};
                const llmUsed = mapperSummary.llm_used;
                const mappingCount = mapperSummary.mapping_count;
                const unmappedBeforeLlm = mapperSummary.unmapped_before_llm;

                resultTitle.textContent = '处理成功';
                resultMessage.textContent = `消息: ${json.message || '成功'}`;
                resultOutput.textContent = outputFile
                    ? `输出文件: ${outputFile}`
                    : '本次未生成输出文件';
                resultMapper.innerHTML = [
                    '<div>映射信息</div>',
                    '<div class="badge-row">',
                    toBadge('LLM Enabled', llmEnabled),
                    toBadge('LLM Used', llmUsed),
                    `<span class="badge">mapping_count: ${mappingCount ?? '-'}</span>`,
                    `<span class="badge">unmapped_before_llm: ${unmappedBeforeLlm ?? '-'}</span>`,
                    '</div>'
                ].join('');

                if (outputUrl) {
                    downloadLink.href = outputUrl;
                    downloadLink.classList.remove('hidden');
                }

                renderRawJson(json);
            } catch (error) {
                statusBox.className = 'result error';
                resultTitle.textContent = '网络错误';
                resultMessage.textContent = String(error);
            }
        });
    </script>
</body>

</html>
